<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>디지털 복권 액자 | 아트봉봉스쿨</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f5f0e8;
  --dark:  #2c2c2c;
  --peach: #f4a07a;
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }
body {
  font-family:"Noto Sans KR",sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.view { display:none; }
.view.active { display:flex; flex-direction:column; align-items:center; }

/* ═══ CARD — 이미지 비율 1055:1491 ═══ */
.card-outer { width:100%; max-width:400px; }

.card-wrap {
  position:relative;
  width:100%;
  aspect-ratio: 1055 / 1491;
  overflow:hidden;
  border-radius:3px;
  line-height:0;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}

/* 업로드 이미지 — 카드 전체를 꽉 채움 */
.card-wrap .uploaded-img {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  z-index:1;
}

/* 도안 폴백 (이미지 미업로드시 배경) */
.card-wrap .doan-bg {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:fill;
  display:block;
  z-index:0;
}

/* 로고 — 스크래치 영역 바로 위, 가운데 */


/* 스크래치 오버레이 — 글자줄 영역 (top 67.5%, height 31.5%) */
#scratchWrap {
  position:absolute;
  top: 67.5%; left:0;
  width:100%; height:31.5%;
  cursor:crosshair; z-index:10;
  touch-action:none;
}
#scratchCanvas { width:100%; height:100%; display:block; }

/* ═══ COVER ═══ */
#view-cover {
  min-height:100vh; width:100%;
  background:var(--cream);
  padding:36px 24px 48px;
  justify-content:center; gap:0;
}
.cover-inner {
  width:100%; max-width:460px;
  display:flex; flex-direction:column; align-items:center; gap:22px;
}
.cover-logo { width:clamp(150px,38%,210px); }
.cover-title {
  font-size:clamp(20px,5vw,28px); font-weight:900;
  color:var(--dark); text-align:center;
  line-height:1.35; letter-spacing:-0.02em; word-break:keep-all;
}
.cover-faces { display:flex; gap:5px; justify-content:center; }
.face {
  width:clamp(40px,10.5vw,60px); height:clamp(40px,10.5vw,60px);
  border-radius:50%; border:2.5px solid var(--dark);
  overflow:hidden; background:#fff;
}
.cover-sub { font-size:13px; color:#666; text-align:center; line-height:1.7; word-break:keep-all; }

/* ═══ CREATOR ═══ */
#view-creator {
  min-height:100vh; background:var(--cream);
  padding:30px 20px 50px; gap:16px;
}
.hd { text-align:center; }
.eyebrow { font-size:11px; font-weight:700; letter-spacing:.18em; color:var(--peach); text-transform:uppercase; margin-bottom:7px; }
.hd h1 { font-size:18px; font-weight:900; color:var(--dark); }
.hd .sub { font-size:12px; color:#888; margin-top:4px; }

/* 업로드 존 */
.upload-area {
  width:100%; max-width:400px;
  background:#fff; border:2px dashed #ddd;
  border-radius:14px; padding:22px 20px;
  text-align:center; cursor:pointer;
  transition:border-color .2s,background .2s;
}
.upload-area:hover,.upload-area.drag { border-color:var(--peach); background:#fff8f5; }
.upload-area input { display:none; }
.upload-area .icon { font-size:26px; margin-bottom:8px; display:block; }
.upload-area h3 { font-size:14px; font-weight:700; color:var(--dark); margin-bottom:3px; }
.upload-area p { font-size:11px; color:#aaa; }

.btn-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; width:100%; max-width:400px; }
.btn {
  font-family:"Noto Sans KR",sans-serif;
  font-size:14px; font-weight:700;
  padding:12px 26px; border-radius:50px;
  cursor:pointer; transition:all .2s; border:none;
}
.btn-primary { background:var(--dark); color:#fff; }
.btn-primary:hover { background:#444; }
.btn-secondary { background:#fff; border:2px solid var(--dark); color:var(--dark); }
.btn-secondary:hover { background:#f5f5f5; }

.share-box {
  width:100%; max-width:400px;
  background:#fff; border:1.5px solid #e8e8e8;
  border-radius:14px; padding:16px 18px;
  animation:fadeUp .3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.share-label { font-size:10px; font-weight:700; color:#bbb; letter-spacing:.1em; text-transform:uppercase; margin-bottom:7px; }
.share-url {
  font-size:11px; font-family:monospace;
  background:#f7f7f7; border-radius:8px;
  padding:9px 11px; color:#777;
  word-break:break-all; margin-bottom:10px;
  line-height:1.5; user-select:all;
}
.share-actions { display:flex; gap:8px; }

/* ═══ RECEIVER ═══ */
#view-receiver {
  min-height:100vh; background:#f9f5ef;
  padding:20px 16px 40px; gap:14px;
  justify-content:flex-start;
}
.rx-hd { text-align:center; }
.rx-eyebrow { font-size:10px; font-weight:700; letter-spacing:.18em; color:var(--peach); text-transform:uppercase; margin-bottom:5px; }
.rx-title { font-size:17px; font-weight:900; color:var(--dark); }
.rx-hint { font-size:12px; color:#bbb; margin-top:3px; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }

.progress-wrap { display:flex; align-items:center; gap:8px; width:100%; max-width:400px; }
.progress-track { flex:1; height:3px; background:rgba(0,0,0,0.07); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#f4a07a,#f2a8b4); border-radius:2px; transition:width .15s; }
.progress-label { font-size:11px; color:#bbb; min-width:34px; text-align:right; }
.rx-actions { display:flex; gap:10px; justify-content:center; }

/* toast */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--dark); color:#fff;
  font-size:13px; font-weight:700;
  padding:10px 22px; border-radius:50px;
  opacity:0; pointer-events:none; transition:all .3s; z-index:999;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@keyframes revealFlash { 0%{opacity:0}25%{opacity:.18}100%{opacity:0} }
.reveal-flash {
  position:absolute; inset:0; background:#fff8f5; pointer-events:none;
  z-index:30; animation:revealFlash .6s ease forwards;
}

/* 업로드 안내 플레이스홀더 */
.upload-placeholder {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; z-index:2; pointer-events:none;
}
.upload-placeholder .up-icon { font-size:32px; opacity:.35; }
.upload-placeholder p { font-size:12px; color:#aaa; pointer-events:none; }
</style>
</head>

    <button class="btn btn-secondary" onclick="showCreator()" style="font-size:12px;padding:9px 18px">← 만들기</button>
    <button class="btn btn-primary" onclick="revealAll()" style="font-size:12px;padding:9px 18px">전체 공개</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let imgDataUrl = null;
const particles = [];
let particleCanvas, particleCtx, particleAnimId;

function route() {
  const p = new URLSearchParams(location.search);
  if (p.get('rx') === '1') {
    const stored = sessionStorage.getItem('scratchData');
    if (stored) { imgDataUrl = JSON.parse(stored).img; activateReceiver(); }
    else showCover();
  }
}

function setActive(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showCover()   { setActive('view-cover'); }
function showCreator() { setActive('view-creator'); }

function activateReceiver() {
  setActive('view-receiver');
  const rx = document.getElementById('rxUploadedImg');
  if (imgDataUrl) { rx.src = imgDataUrl; rx.style.display = 'block'; }
  setTimeout(initScratch, 80);
}

/* ── upload ── */
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) readFile(f);
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) readFile(e.target.files[0]);
});

function readFile(file) {
  const r = new FileReader();
  r.onload = ev => {
    imgDataUrl = ev.target.result;
    const pui = document.getElementById('previewUploadedImg');
    pui.src = imgDataUrl;
    pui.style.display = 'block';
    document.getElementById('uploadPlaceholder').style.display = 'none';
    document.getElementById('actionBtns').style.display = 'flex';
    dz.querySelector('h3').textContent = '업로드 완료 — 재클릭 시 교체';
    dz.querySelector('p').textContent = '';
    showToast('이미지 업로드 완료');
  };
  r.readAsDataURL(file);
}

function goPreview() {
  if (!imgDataUrl) { showToast('이미지를 먼저 업로드하세요'); return; }
  sessionStorage.setItem('scratchData', JSON.stringify({img: imgDataUrl}));
  activateReceiver();
}
function generateLink() {
  if (!imgDataUrl) { showToast('이미지를 먼저 업로드하세요'); return; }
  sessionStorage.setItem('scratchData', JSON.stringify({img: imgDataUrl}));
  const url = location.origin + location.pathname + '?rx=1';
  document.getElementById('shareUrl').textContent = url;
  const box = document.getElementById('shareBox');
  box.style.display = 'block';
  setTimeout(() => box.scrollIntoView({behavior:'smooth',block:'nearest'}), 60);
  showToast('링크가 생성되었습니다');
}
function copyLink() {
  const txt = document.getElementById('shareUrl').textContent;
  if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => showToast('링크 복사 완료!'));
  else {
    const ta = document.createElement('textarea');
    ta.value=txt; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove(); showToast('링크 복사 완료!');
  }
}

/* ── particles ── */
function initParticleLayer(wrap) {
  particleCanvas = document.createElement('canvas');
  particleCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15';
  wrap.appendChild(particleCanvas);
  particleCanvas.width  = wrap.offsetWidth;
  particleCanvas.height = wrap.offsetHeight;
  particleCtx = particleCanvas.getContext('2d');
  animateParticles();
}
function spawnParticles(x, y, count) {
  for (let i=0;i<count;i++) {
    const angle=Math.random()*Math.PI*2, speed=Math.random()*3.5+0.8;
    const gray=Math.floor(Math.random()*55+8);
    particles.push({
      x, y,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-Math.random()*2.2,
      life:1.0, decay:Math.random()*0.04+0.022, size:Math.random()*3.5+0.7,
      color:`${gray},${gray},${gray}`, gravity:0.13+Math.random()*0.09, wobble:(Math.random()-.5)*.28
    });
  }
}
function animateParticles() {
  particleAnimId = requestAnimationFrame(animateParticles);
  particleCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx+=p.wobble; p.life-=p.decay;
    if (p.life<=0){particles.splice(i,1);continue;}
    particleCtx.save();
    particleCtx.globalAlpha=p.life*0.85;
    particleCtx.translate(p.x,p.y);
    particleCtx.rotate(Math.atan2(p.vy,p.vx));
    particleCtx.fillStyle=`rgb(${p.color})`;
    particleCtx.beginPath();
    particleCtx.ellipse(0,0,p.size*1.9,p.size*0.55,0,0,Math.PI*2);
    particleCtx.fill(); particleCtx.restore();
  }
}

/* ── scratch ── */
function initScratch() {
  const wrap   = document.getElementById('scratchWrap');
  const canvas = document.getElementById('scratchCanvas');
  const w=wrap.offsetWidth||300, h=wrap.offsetHeight||120;
  canvas.width=w; canvas.height=h;

  const old=wrap.querySelector('canvas:not(#scratchCanvas)');
  if(old)old.remove();
  particles.length=0;
  if(particleAnimId)cancelAnimationFrame(particleAnimId);
  initParticleLayer(wrap);

  const ctx=canvas.getContext('2d');

  /* 은박 코팅 */
  const g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,'#b0b0b0'); g.addColorStop(.2,'#d8d8d8');
  g.addColorStop(.5,'#a6a6a6'); g.addColorStop(.78,'#cdcdcd'); g.addColorStop(1,'#b6b6b6');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);

  /* grain */
  for(let y=0;y<h;y+=2){
    ctx.fillStyle=`rgba(${Math.random()>.5?255:0},${Math.random()>.5?255:0},${Math.random()>.5?255:0},0.018)`;
    ctx.fillRect(0,y,w,1);
  }
  for(let x=0;x<w;x+=5){ctx.fillStyle='rgba(0,0,0,0.028)';ctx.fillRect(x,0,1,h);}

  /* sheen */
  const sh=ctx.createLinearGradient(0,0,w*.5,h*.5);
  sh.addColorStop(0,'rgba(255,255,255,0)'); sh.addColorStop(.4,'rgba(255,255,255,0.15)'); sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh; ctx.fillRect(0,0,w,h);

  /* 텍스트 */
  const fs=Math.max(10,Math.min(15,w/18));
  ctx.fillStyle='rgba(18,13,4,0.36)';
  ctx.font=`700 ${fs}px "Noto Sans KR",sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('긁어서 확인하세요 ✦',w/2,h/2);

  /* 금빛 플렉 */
  for(let i=0;i<18;i++){
    ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*1.3+.3,0,Math.PI*2);
    ctx.fillStyle=`rgba(201,168,76,${Math.random()*.15+.05})`;ctx.fill();
  }

  let drawing=false,lastX=null,lastY=null,revealedArea=0;
  const totalArea=w*h;

  function scratch(x,y){
    ctx.globalCompositeOperation='destination-out';
    const r=Math.max(8,Math.min(13,w/24));
    if(lastX!==null){
      const dx=x-lastX,dy=y-lastY,dist=Math.sqrt(dx*dx+dy*dy);
      const steps=Math.max(1,Math.floor(dist/6));
      for(let s=0;s<=steps;s++){
        const px=lastX+dx*(s/steps),py=lastY+dy*(s/steps);
        for(let k=0;k<2;k++){
          const ox=(Math.random()-.5)*r*.35,oy=(Math.random()-.5)*r*.35;
          const rx2=r*(.6+Math.random()*.4),ry2=r*(.45+Math.random()*.35);
          ctx.save();ctx.translate(px+ox,py+oy);ctx.rotate(Math.random()*Math.PI);
          ctx.beginPath();ctx.ellipse(0,0,rx2,ry2,0,0,Math.PI*2);ctx.fill();ctx.restore();
        }
      }
    } else {ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
    lastX=x;lastY=y;
    spawnParticles(x,y,Math.floor(Math.random()*3+2));
    revealedArea+=Math.PI*Math.pow(r,2);
    const pct=Math.min(100,Math.round((revealedArea/totalArea)*56));
    const c=Math.min(100,pct);
    document.getElementById('progressFill').style.width=c+'%';
    document.getElementById('progressLabel').textContent=c+'%';
    document.getElementById('rxHint').style.opacity=Math.max(0,1-c/20);
    if(c>=92)revealAll();
  }
  function endStroke(){drawing=false;lastX=null;lastY=null;}
  function getPos(e){
    const rect=canvas.getBoundingClientRect();
    const sx=canvas.width/rect.width,sy=canvas.height/rect.height;
    if(e.touches)return{x:(e.touches[0].clientX-rect.left)*sx,y:(e.touches[0].clientY-rect.top)*sy};
    return{x:(e.clientX-rect.left)*sx,y:(e.clientY-rect.top)*sy};
  }
  canvas.addEventListener('mousedown',e=>{drawing=true;scratch(...Object.values(getPos(e)));});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;scratch(...Object.values(getPos(e)));});
  canvas.addEventListener('mouseup',endStroke);
  canvas.addEventListener('mouseleave',endStroke);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;scratch(...Object.values(getPos(e)));},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;scratch(...Object.values(getPos(e)));},{passive:false});
  canvas.addEventListener('touchend',endStroke);
}

function revealAll(){
  const canvas=document.getElementById('scratchCanvas');
  const ctx=canvas.getContext('2d');
  ctx.globalCompositeOperation='destination-out';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressLabel').textContent='100%';
  document.getElementById('rxHint').style.opacity='0';
  /* 캔버스와 스크래치 래퍼를 완전히 숨겨 이미지가 그대로 보이도록 */
  setTimeout(()=>{
    if(particleAnimId)cancelAnimationFrame(particleAnimId);
    if(particleCanvas)particleCanvas.style.display='none';
    document.getElementById('scratchCanvas').style.display='none';
    document.getElementById('scratchWrap').style.display='none';
  },400);
  document.getElementById('scratchWrap').style.pointerEvents='none';
  const flash=document.createElement('div');
  flash.className='reveal-flash';
  document.getElementById('rxCard').appendChild(flash);
  setTimeout(()=>flash.remove(),700);
  showToast('✦ 공개 완료!');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

route();
</script>
</body>
</html>
